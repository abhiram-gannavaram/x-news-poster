# AI/Tech insight posts for X — research + multi-gate validation before publish
name: Post AI/Tech News to X

on:
  schedule:
    # Every 4 hours UTC → 6 runs/day
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (never call X API)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      auto_post:
        description: "Actually post if validation passes (ignored when dry_run=true)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: post-x-news
  cancel-in-progress: false

jobs:
  post-news:
    name: Fetch → Research → Write → Validate → Post
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1) Fetch RSS candidates
        run: python agents/fetch_news.py

      - name: 2) Deep research (fetch pages + extract verified facts)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: python agents/research.py

      - name: 3) Write human insight draft
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: python agents/analyze_and_generate.py

      - name: 4) Validate (style + facts + quality)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: python agents/validate.py

      - name: Show draft / validation summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for name in ["research_brief.json", "validation_report.json", "tweets_to_post.json"]:
              p = Path("data") / name
              print(f"\n===== {name} =====")
              if not p.exists():
                  print("(missing)")
                  continue
              data = json.loads(p.read_text())
              if name == "tweets_to_post.json":
                  for t in data.get("tweets") or []:
                      print("APPROVED:", t.get("validation_approved"))
                      print("CHARS:", t.get("char_count"))
                      print("TEXT:", t.get("tweet"))
              elif name == "validation_report.json":
                  print("approved_count:", data.get("approved_count"))
                  for r in data.get("reports") or []:
                      print("approved:", r.get("approved"), "reasons:", r.get("reject_reasons"))
                      print("final:", r.get("final_tweet") or r.get("original_tweet"))
              else:
                  print("items:", data.get("count"))
                  for it in (data.get("items") or [])[:3]:
                      print("-", it.get("title"), "| conf=", it.get("confidence"))
          PY

      - name: 5) Post to X (only if validation_approved and auto_post)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # Scheduled runs auto-post only after validation; manual defaults to dry.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          AUTO_POST: ${{ github.event_name == 'schedule' && 'true' || inputs.auto_post }}
        run: python agents/post_to_x.py

      - name: Commit updated post history
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false' && inputs.auto_post == 'true') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_news.json
          if git diff --staged --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: update posted news history [skip ci]"
            git push
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-data-${{ github.run_id }}
          path: |
            data/candidates.json
            data/research_brief.json
            data/tweets_to_post.json
            data/validation_report.json
            data/posted_news.json
          if-no-files-found: ignore
          retention-days: 14
