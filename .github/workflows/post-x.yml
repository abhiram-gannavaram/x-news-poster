# AI/Tech insight posts for X — research + multi-gate validation before publish
name: Post AI/Tech News to X

on:
  schedule:
    # Every 2 hours UTC → up to 12 attempts/day; code enforces ≥2h between live posts
    # Live posting starts 2026-07-12 (see LIVE_START_DATE in post_to_x.py)
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (never call X API)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      auto_post:
        description: "Actually post if validation passes (set true WITH dry_run=false for live manual post)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: post-x-news
  cancel-in-progress: false

jobs:
  post-news:
    name: Fetch → Research → Write → Validate → Post
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Optional kill-switch: set repo variable ENABLE_AUTO_POST=false to pause scheduled live posts
    env:
      ENABLE_AUTO_POST: ${{ vars.ENABLE_AUTO_POST }}
      # First day live posts are allowed (UTC date YYYY-MM-DD). Override via repo variable if needed.
      LIVE_START_DATE: ${{ vars.LIVE_START_DATE != '' && vars.LIVE_START_DATE || '2026-07-12' }}
      MIN_POST_GAP_HOURS: ${{ vars.MIN_POST_GAP_HOURS != '' && vars.MIN_POST_GAP_HOURS || '2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1) Fetch RSS candidates
        run: python agents/fetch_news.py

      - name: 2) Deep research (fetch pages + extract verified facts)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: python agents/research.py

      - name: 3) Write human insight draft
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: python agents/analyze_and_generate.py

      - name: 4) Validate (style + facts + quality)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: python agents/validate.py

      - name: Show draft / validation summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for name in ["research_brief.json", "validation_report.json", "tweets_to_post.json"]:
              p = Path("data") / name
              print(f"\n===== {name} =====")
              if not p.exists():
                  print("(missing)")
                  continue
              data = json.loads(p.read_text())
              if name == "tweets_to_post.json":
                  for t in data.get("tweets") or []:
                      print("status:", t.get("status"), "approved:", t.get("validation_approved"))
                      print("CHARS:", t.get("char_count"))
                      print("TEXT:", t.get("tweet"))
                      if t.get("reject_reasons"):
                          print("reject:", t.get("reject_reasons"))
              elif name == "validation_report.json":
                  print("approved_count:", data.get("approved_count"))
                  for r in data.get("reports") or []:
                      print("approved:", r.get("approved"), "reasons:", r.get("reject_reasons"))
                      print("final:", r.get("final_tweet") or r.get("original_tweet"))
              else:
                  print("items:", data.get("count"))
                  for it in (data.get("items") or [])[:3]:
                      print("-", it.get("title"), "| conf=", it.get("confidence"))
          PY

      - name: Resolve post mode
        id: mode
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          ENABLE="${ENABLE_AUTO_POST:-true}"

          if [ "$EVENT" = "schedule" ]; then
            # Scheduled: live unless kill-switch ENABLE_AUTO_POST=false
            if [ "$ENABLE" = "false" ] || [ "$ENABLE" = "0" ]; then
              echo "dry_run=true" >> "$GITHUB_OUTPUT"
              echo "auto_post=false" >> "$GITHUB_OUTPUT"
              echo "live=false" >> "$GITHUB_OUTPUT"
              echo "Schedule kill-switch active (ENABLE_AUTO_POST=false) — dry run only"
            else:
              echo "dry_run=false" >> "$GITHUB_OUTPUT"
              echo "auto_post=true" >> "$GITHUB_OUTPUT"
              echo "live=true" >> "$GITHUB_OUTPUT"
              echo "Schedule live post enabled"
            fi
          else:
            # Manual: explicit string compares (never truthy "false")
            DR="${{ inputs.dry_run }}"
            AP="${{ inputs.auto_post }}"
            echo "dry_run=${DR}" >> "$GITHUB_OUTPUT"
            echo "auto_post=${AP}" >> "$GITHUB_OUTPUT"
            if [ "$DR" = "false" ] && [ "$AP" = "true" ]; then
              echo "live=true" >> "$GITHUB_OUTPUT"
            else:
              echo "live=false" >> "$GITHUB_OUTPUT"
            fi
            echo "Manual dry_run=${DR} auto_post=${AP}"
          fi

      - name: 5) Post to X (validated + mode)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
          AUTO_POST: ${{ steps.mode.outputs.auto_post }}
          LIVE_START_DATE: ${{ env.LIVE_START_DATE }}
          MIN_POST_GAP_HOURS: ${{ env.MIN_POST_GAP_HOURS }}
        run: python agents/post_to_x.py

      - name: Commit updated post history
        if: ${{ steps.mode.outputs.live == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_news.json
          if git diff --staged --quiet; then
            echo "No history changes to commit."
          else:
            git commit -m "chore: update posted news history [skip ci]"
            # Retry push once after pull --rebase to reduce race with concurrent human commits
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: run-data-${{ github.run_id }}
          path: |
            data/candidates.json
            data/research_brief.json
            data/tweets_to_post.json
            data/validation_report.json
            data/posted_news.json
          if-no-files-found: ignore
          retention-days: 14
